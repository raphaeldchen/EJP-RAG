      - heading "Reentry Resources" [level=1] [ref=e83]
      - generic [ref=e84]:
        - paragraph [ref=e85]: When people are released from prison, they face challenges that hinder their path to healing and becoming productive members of society. Specifically, due to systemic societal and legal barriers, it is extremely difficult for formerly incarcerated people to secure gainful employment and find affordable housing.
        - paragraph [ref=e86]: In order to alleviate the reentry burden, a number of organizations in and around Chicago offer aid and programs to and for returning citizens. These services include everything from housing help and job training to legal aid for record expungement.
