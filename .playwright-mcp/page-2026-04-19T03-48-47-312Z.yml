        - generic [ref=e54]:
          - generic [ref=e55]: Illinois Criminal Justice Information Authority
          - generic [ref=e57]: https://icjia.illinois.gov/
          - generic [ref=e58]:
            - paragraph [ref=e59]: Created in 1983, the Illinois Criminal Justice Information Authority is a state agency dedicated to improving the administration of criminal justice. The Authority brings together key leaders from the justice system and the public to identify critical issues facing the criminal justice system in Illinois, and to propose and evaluate policies, programs, and legislation that address those issues. The agency also works to ensure the criminal justice system in Illinois is efficient and effective.
            - paragraph [ref=e60]: The Authority’s specific powers and duties are detailed in the Illinois Criminal Justice Information Act (20 ILCS 3930 et. seq.) The statutory responsibilities of the Authority fall under the categories of grants administration, research and analysis, policy and planning, and information systems and technology.
        - button "Search Documents" [ref=e64]:
