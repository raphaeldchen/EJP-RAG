          - generic [ref=e34]: Adult Redeploy Illinois
          - generic [ref=e36]: https://icjia.illinois.gov/adultredeploy/
          - paragraph [ref=e38]: Adult Redeploy Illinois was established by the Crime Reduction Act (Public Act 96-0761) to provide financial incentives to local jurisdictions for programs that allow diversion of non-violent offenders from state prisons by providing community-based services. Grants are provided to counties, groups of counties, and judicial circuits to increase programming in their areas, in exchange for reducing the number of people they send to the Illinois Department of Corrections.
