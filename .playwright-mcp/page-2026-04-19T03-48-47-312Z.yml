          - generic [ref=e101]: https://spac.illinois.gov/
          - generic [ref=e102]:
            - paragraph [ref=e103]: SPAC was created to collect, analyze and present data from all relevant sources to more accurately determine the consequences of sentencing policy decisions and to review the effectiveness and efficiency of current sentencing policies and practices.
            - paragraph [ref=e104]: The purpose of SPAC is to review sentencing policies and practices and examine how those policies and practices impact the criminal justice system as a whole in the State of Illinois.
