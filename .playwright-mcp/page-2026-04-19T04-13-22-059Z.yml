                - text: Thank you for your interest in the Illinois Community College System – We hope you enjoy the interactive format and welcome suggestions for improving the portal. Special acknowledgment goes to local community college officials for their assistance in providing the data and information needed to compile these tables. Institutional researchers, information technology professionals, financial officers, facilities managers, officials from admission and records, human resource professionals, and others all make important contributions. If you have requests for other data or suggestions for additions or deletions, please contact the ICCB office –
