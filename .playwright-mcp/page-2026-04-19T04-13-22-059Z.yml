            - heading "Data Book" [level=3] [ref=e112]
            - generic [ref=e114]:
              - paragraph [ref=e115]: Comprehensive Data Books are produced by the ICCB in partnership with the Illinois Community College System. The objective of the Data Book is to provide useful summaries of data by community college. Student and Employee Data Book Tables are primarily obtained from individual-level MIS submissions and compiled by ICCB to produce summary-level data. Fiscal and facilities tables are primarily captured through summary-level MIS submissions to the ICCB. In keeping with the Illinois Community College System’s interest in transparency and accountability, beginning with the 2009 Data Book, tables are provided in downloadable Excel spreadsheet format.
              - paragraph [ref=e116]:
                - strong [ref=e117]: Accessing the Data Book
                - text: "— Choose the fiscal year of interest from below and then select one of the five sections (Section I: Fall Student Characteristics; Section II: Faculty and Staff Data; Section III: Annual Student Enrollment and Completion Data; Section IV: Financial Data; and Section V: Facilities Data*)"
              - paragraph [ref=e118]:
                - emphasis [ref=e119]: "*Facilities Data available through 2017 only."
