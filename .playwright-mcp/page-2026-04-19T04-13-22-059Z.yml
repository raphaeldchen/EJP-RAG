          - generic [ref=e73]:
            - generic [ref=e75]:
              - paragraph [ref=e76]: The ICCB Research and Analytics division serves as the ICCB foundational resource for the development, measurement and analysis of Illinois Community College System data. Staff provide information, counsel, and technical assistance for projects and initiatives related to research and policy studies. The Division, in collaboration with ICCB Information Technology staff, maintains a comprehensive and robust ICCB Centralized Data System for the Illinois Community College System to answer critical policy questions, inform continuous student and program improvement initiatives, and ultimately, support students on pathways to success. On behalf of the Illinois Community College System, the Division compiles data from the ICCB Centralized Data System for state/federal accountability reporting, cross-state agency projects, and national initiatives. The Division represents the agency in Illinois Longitudinal Data System efforts and advances cross-state agency data projects and initiatives to analyze the effectiveness of P-20 to Workforce programs.
              - paragraph [ref=e77]
            - heading "Annual Report" [level=3] [ref=e81]
            - generic [ref=e83]:
              - paragraph [ref=e84]:
                - strong [ref=e85]: The ICCB Annual Report on Student Enrollments and Completions in the Illinois Community College System
                - text: contains detailed information and data tables about students in Illinois community colleges. The Annual Report is produced by ICCB in partnership with the Illinois Community College System. Annual Report data are obtained from community college student-level MIS submissions and compiled by ICCB to produce summary-level data. The objective of the Annual Report is to provide useful summary data in one reference document.
              - paragraph [ref=e86]: The Annual Report contains data on students officially enrolled in credit coursework at any time during the specified fiscal year (Appendix A). Illinois community colleges are multipurpose institutions with the capacity to offer college preparatory courses, short-term continuing education, retraining, certificate and degree programs for high demand jobs, and associate’s degrees for career preparation or transfer to bachelor’s degree programs. Detailed completions (i.e. graduates) data are also provided in the report (Appendix C). Community colleges mainly award associate degrees and postsecondary certificates. Certificates can range anywhere from a few months to a couple years to complete. Additionally, to capture the full mission of community colleges, the report includes students participating in noncredit coursework (Appendix B). Noncredit courses provide activities that do not meet ICCB Rules for credit courses, such as those designed for specific employers, professional development, or others offered for hobby, leisure, or recreational purposes.
