            - paragraph [ref=e301]:
              - text: Restore Justice’s office in the River North neighborhood of Chicago is located on the unceded lands of the Bodwéwadmi (Potawatomi), Kiikaapoi (Kickapoo), Myaamia (Miami), Peoria, Očhéthi Šakówiŋ, and Kaskaskia tribes.
              - text: These nations lived, gathered, traveled, and traded here long before non-Native people settled in Chicago. They were removed from the land through deadly conflict and unfair treaties. Today Chicago has the third-largest urban Native American population in the United States, consisting of a diverse, multi-tribal community with over 100 tribal nations represented.
            - paragraph
