  - main [ref=e72]:
    - generic [ref=e74]:
      - img [ref=e77]
      - generic [ref=e79]:
        - heading "No human is disposable." [level=1] [ref=e82]
        - paragraph [ref=e84]: We work to make Illinois a safer and more compassionate state by replacing the ineffective, extreme sentencing policies of the past with evidence-based laws that allow families and communities to heal.
        - generic [ref=e85]:
          - link "Get Involved" [ref=e86] [cursor=pointer]:
            - /url: https://www.restorejustice.org/get-involved/
          - link "Read stories of impact" [ref=e87] [cursor=pointer]:
            - /url: https://www.restorejustice.org/learn/legal-system-stories/
    - generic [ref=e90]:
      - generic [ref=e91]:
        - heading "Our Work" [level=3] [ref=e92]
        - heading "What we do" [level=2] [ref=e94]
        - paragraph [ref=e96]: Restore Justice advances legislative change, trains advocates, and conducts research with a focus on rolling back the punitive policies of the past and replacing them with smart and safe policies for the future. We seek to support, empower, and promote healing and hope for people who are incarcerated, their loved ones, and their communities.
        - link "Read about our impact" [ref=e98] [cursor=pointer]:
          - /url: https://www.restorejustice.org/our-work/impact/
      - generic [ref=e99]:
        - generic [ref=e100]:
          - heading "Advocating for fairer laws" [level=3] [ref=e103]
          - paragraph [ref=e105]: We aim to center the voices of those most harmed by Illinois’ unjust criminal legal policies by engaging system-impacted people in our policy work. Thanks to the tenacious advocacy of our policy team, Illinois recently became the 26th state to abolish life without parole sentences for children and young adults! Our work now seeks to further undo the Illinois laws that result in extreme sentences, especially for young people.
          - link "learn about our legislative impact" [ref=e107] [cursor=pointer]:
            - /url: https://www.restorejustice.org/impact/legislative-impact/
        - generic [ref=e108]:
          - heading "Our work with communities" [level=3] [ref=e111]
          - paragraph [ref=e113]: In addition to our advocacy work, we engage with communities through a variety of support groups, including Communities and Relatives of Illinois Incarcerated Citizens (CRIIC) and our Returning Citizens Network (RCN). Both of these groups were founded and continue to be run by system-impacted people, and provide spaces of support and resilience for community members and returning citizens.
          - link "Learn about our Community Impact" [ref=e115] [cursor=pointer]:
            - /url: https://www.restorejustice.org/impact/community-impact/
    - generic [ref=e118]:
      - generic [ref=e119]:
        - heading "Our main focus areas" [level=2] [ref=e120]
        - paragraph [ref=e122]: "We center our reform efforts on three primary issue areas: sentencing, prison conditions and practices, and pathways to release. We focus on multiple issues in each of these areas."
      - generic [ref=e123]:
        - link "Sentencing In Illinois, long base sentences, penalty enhancements, and a lack of early release opportunities lead to extremely long prison terms. Restore Justice works to eliminate mandatory minimums, roll back firearm enhancements, and give judges more discretion. Learn more about our sentencing work" [ref=e124] [cursor=pointer]:
          - /url: https://www.restorejustice.org/issues/sentencing/
          - generic [ref=e125]:
            - heading "Sentencing" [level=3] [ref=e126]
            - paragraph [ref=e127]: In Illinois, long base sentences, penalty enhancements, and a lack of early release opportunities lead to extremely long prison terms. Restore Justice works to eliminate mandatory minimums, roll back firearm enhancements, and give judges more discretion.
            - generic [ref=e128]: Learn more about our sentencing work
        - link "Prison conditions and practices The human, social, and economic costs of our current prison system are intolerable. We support efforts to move Illinois corrections towards a model that values rehabilitation over punishment. Read how we do that" [ref=e129] [cursor=pointer]:
          - /url: https://www.restorejustice.org/issues/prison-conditions-practices/
          - generic [ref=e130]:
            - heading "Prison conditions and practices" [level=3] [ref=e131]
            - paragraph [ref=e132]: The human, social, and economic costs of our current prison system are intolerable. We support efforts to move Illinois corrections towards a model that values rehabilitation over punishment.
            - generic [ref=e133]: Read how we do that
        - link "Pathways to release In the 1970s and 1990s, Illinois restricted early release opportunities for most incarcerated people. Today, many people who enter prison in Illinois have few meaningful ways to work toward their release. We are working to change that. Read about our work in this area" [ref=e134] [cursor=pointer]:
          - /url: https://www.restorejustice.org/issues/release/
          - generic [ref=e135]:
            - heading "Pathways to release" [level=3] [ref=e136]
            - paragraph [ref=e137]: In the 1970s and 1990s, Illinois restricted early release opportunities for most incarcerated people. Today, many people who enter prison in Illinois have few meaningful ways to work toward their release. We are working to change that.
            - generic [ref=e138]: Read about our work in this area
    - generic [ref=e141]:
      - generic [ref=e142]:
        - heading "Context" [level=3] [ref=e143]
        - heading "Restore Justice education initiatives" [level=2] [ref=e145]
        - paragraph [ref=e147]: Restore Justice works to educate people in Illinois about our state’s criminal legal system policies and practices. This includes providing information about the reality of how our laws impact people’s lives and speaking with state legislators about how we believe Illinois’ criminal legal system needs to change.
        - link "Learn about the issues" [ref=e149] [cursor=pointer]:
          - /url: https://www.restorejustice.org/learn/
      - generic [ref=e150]:
        - generic [ref=e151]:
          - heading "Learn more" [level=3] [ref=e154]
          - paragraph [ref=e156]: Restore Justice conducts research on the laws that impact sentencing practices in Illinois. We use that research to publish a commentary series which provides straightforward explanations of some of the state’s unique criminal legal policies and practices, and how these policies have converged to deprive children and young adults of their liberty, their chance for rehabilitation, and their possibility of release.
          - link "Read about the criminal legal system" [ref=e158] [cursor=pointer]:
            - /url: https://www.restorejustice.org/learn/legal-system-basics/
        - generic [ref=e159]:
          - heading "Our legislative agenda" [level=3] [ref=e162]
          - paragraph [ref=e164]: We are focused on retroactively abolishing sentences of life without the possibility of parole for children and young adults. We are also working to make both firearm enhancements and mandatory minimums for young people discretionary, limit the scope of Illinois’ law of accountability, roll back “truth-in-sentencing” laws, restrict the use of solitary confinement, and create resentencing opportunities for everyone incarcerated in Illinois state prisons.
          - link "See Our agenda" [ref=e166] [cursor=pointer]:
            - /url: https://www.restorejustice.org/legislation/
